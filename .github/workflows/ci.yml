name: CI

on:
  push:
    branches:
      - main
      - develop
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Prepare ') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --manifest-path backend/Cargo.toml --all --check

      - name: Run Rust tests
        run: cargo test --manifest-path backend/Cargo.toml --quiet

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check CI scripts syntax
        run: |
          sh -n scripts/build.sh

  docker-smoke:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Prepare ') }}
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image without publishing
        env:
          IMAGE_NAME: routecraft-ci
          BUILD_NUMBER: ${{ github.run_number }}
        run: sh ./scripts/build.sh
